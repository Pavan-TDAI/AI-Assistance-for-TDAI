name: personal-ai-agent-platform

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: ${SERVER_PORT:-4000}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-personal_ai_agent}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      DEFAULT_OPENAI_MODEL: ${DEFAULT_OPENAI_MODEL:-gpt-4o-mini}
      DEFAULT_GEMINI_MODEL: ${DEFAULT_GEMINI_MODEL:-gemini-2.5-flash}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-llama3.1:8b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-organizations}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_REFRESH_TOKEN: ${MICROSOFT_REFRESH_TOKEN:-}
      SAFE_ROOTS: ${SAFE_ROOTS:-/workspace}
      SAFE_SHELL_COMMANDS: ${SAFE_SHELL_COMMANDS:-ls,pwd}
      BLOCKED_SHELL_PATTERNS: ${BLOCKED_SHELL_PATTERNS:-}
      HEADLESS_BROWSER: ${HEADLESS_BROWSER:-false}
    ports:
      - "${SERVER_PORT:-4000}:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - server-uploads:/workspace/apps/server/.tdai-uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  mongo-data:
  server-uploads:
